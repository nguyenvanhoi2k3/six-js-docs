<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      try {
        var t = localStorage.getItem("six-js-theme") || (matchMedia("(prefers-color-scheme: light)").matches ? "light" : "dark");
        document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/sixjs_logo_fav_56x56.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>SixJS - Installation</title>
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/pages/installation.ts"></script>
  </body>
</html>
